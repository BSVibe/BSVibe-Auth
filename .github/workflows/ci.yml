name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  auth-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: auth-app/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E test
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: auth-app/playwright-report/
          retention-days: 7

  js-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --extra fastapi

      - name: Test
        run: uv run pytest tests/ -v
