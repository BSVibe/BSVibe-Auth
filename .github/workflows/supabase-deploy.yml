name: Supabase Deploy

# Push canonical Supabase migrations to the production project on main merge.
#
# Background: until 2026-05-03 the auth-app supabase migrations
# (tenants/audit/alert_routes) were "manual apply via Dashboard SQL Editor"
# per supabase/README.md. That step was forgotten across multiple PRs and
# silently broke prod tenant resolution — `/api/session` swallowed the
# missing-table error and returned `active_tenant_id: null` for every user.
# This workflow makes apply automatic, so adding a new migration file IS the
# deploy.
#
# Required GitHub secrets (configure once in repo settings):
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — DB password for project hobuqhkrqqhuvpxofdcc
#                            (Supabase Dashboard → Project Settings → Database)
#
# Project ref is intentionally hardcoded (not a secret) so a misconfigured
# secret can never silently retarget this workflow at the wrong project.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:
    inputs:
      include_seed:
        description: 'Also apply supabase/seed.sql (idempotent)'
        required: false
        default: 'false'

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: hobuqhkrqqhuvpxofdcc
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.95.4

      - name: Verify required secrets
        run: |
          missing=()
          [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] && missing+=("SUPABASE_ACCESS_TOKEN")
          [ -z "${SUPABASE_DB_PASSWORD:-}" ] && missing+=("SUPABASE_DB_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing repo secrets: ${missing[*]}"
            exit 1
          fi

      - name: Link Supabase project
        working-directory: supabase
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Migration tracking — pre-push state
        working-directory: supabase
        run: supabase migration list --linked

      - name: Push migrations
        working-directory: supabase
        run: supabase db push --include-all --debug

      - name: Verify tables exist (sanity check)
        working-directory: supabase
        run: |
          set -e
          for table in tenants tenant_members audit_events alert_routes; do
            echo "--- public.$table ---"
            supabase db query --linked \
              "SELECT to_regclass('public.${table}') IS NOT NULL AS exists"
          done

      - name: Apply seed (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_seed == 'true'
        working-directory: supabase
        run: |
          if [ -f seed.sql ]; then
            supabase db query --linked --file seed.sql
          else
            echo "::notice::supabase/seed.sql not present — skipping"
          fi
